# ==============================================================================
# clibot Quick Start Configuration
# ==============================================================================
# This is a minimal configuration for new users to get started quickly.
#
# Setup Steps:
#   1. Copy this file: cp configs/config.mini.yaml ~/.config/clibot/config.yaml
#   2. Replace YOUR_TELEGRAM_USER_ID with your actual Telegram user ID
#      (Get it by sending any message to your bot and using 'echo' command)
#   3. Replace YOUR_BOT_TOKEN with your Telegram bot token
#      (Get it from BotFather: https://t.me/BotFather)
#   4. Update work_dir to your actual project directory
#   5. Run: clibot serve --config ~/.config/clibot/config.yaml
#
# For more options, see config.full.yaml
# ==============================================================================

# Security: whitelist must be enabled
security:
  whitelist_enabled: true
  allowed_users:
    telegram:
      - "YOUR_TELEGRAM_USER_ID"    # Replace with your Telegram user ID (number)
  admins:
    telegram:
      - "YOUR_TELEGRAM_USER_ID"    # Admin users can manage sessions (sdel, sclose, etc.)

# Telegram Bot Configuration
bots:
  telegram:
    enabled: true
    token: "YOUR_BOT_TOKEN"         # Replace with your Telegram bot token

  # QQ Bot Configuration (optional)
  # qq:
  #   enabled: false                 # Set to true to enable QQ bot
  #   app_id: "YOUR_QQ_APP_ID"      # Get from QQ Open Platform: https://bots.qq.com
  #   app_secret: "YOUR_QQ_APP_SECRET"  # Get from QQ Open Platform

# ==============================================================================
# Session Configuration
# ==============================================================================
# NOTE: 'name' is your custom identifier (e.g., "my-project", "backend-api")
#        'cli_type' is the AI CLI tool to use (acp, claude, gemini, opencode)
# ==============================================================================

sessions:
  - name: "my-project"
    cli_type: "acp"                 # ACP mode - streaming, no tmux needed
    work_dir: "/home/user/projects" # Change to your project directory
    start_cmd: "claude-agent-acp"   # ACP server command
    transport: "stdio://"           # Use stdio transport
    auto_start: true
    # env:                          # Optional: session-level env vars (ACP adapter only)
    #   ANTHROPIC_API_KEY: "sk-ant-..."  # Or set ANTHROPIC_AUTH_TOKEN

# CLI Adapter Configuration
cli_adapters:
  acp:
    timeout: "5m"                   # Request timeout (idle time)
